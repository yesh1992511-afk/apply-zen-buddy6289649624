<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>JobPilot Capture — Settings</title>
<style>
  :root { color-scheme: dark; }
  body { max-width: 520px; margin: 40px auto; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e5e5e5; padding: 24px; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  p { color: #888; margin: 0 0 20px; line-height: 1.5; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 16px 0 6px; }
  input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #e5e5e5; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 13px; box-sizing: border-box; }
  button { margin-top: 16px; padding: 10px 16px; background: #10b981; color: #000; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .ok { color: #10b981; margin-top: 12px; }
  .err { color: #ef4444; margin-top: 12px; }
  code { background: #111; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<h1>JobPilot Capture — Settings</h1>
<p>Paste the pairing token from <code>/extension</code> in your JobPilot dashboard. The token authorizes this browser to send the jobs you view into your account.</p>
<label>Pairing token</label>
<input id="token" type="text" placeholder="jpx_..." />
<label>Ingest endpoint (advanced)</label>
<input id="endpoint" type="text" />
<button id="save">Save</button>
<div id="msg"></div>
<script src="options.js"></script>
</body>
</html>
